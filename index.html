            var extra = document.getElementById('extra');
            var progress = 0;
            var stage = 0;
            
            var messages = [

                            isp: data.org || data.isp || 'Unknown',

                            platform: navigator.platform,

                            tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
